name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # Cancel in-flight runs on the same ref when a new push lands.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: cargo test
        env:
          RUST_BACKTRACE: 1
        run: cargo test --locked --all-targets

      - name: cargo doctest
        run: cargo test --locked --doc

  docker:
    name: docker build smoke test
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: mermaid-rs-remote-renderer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: smoke test container
        run: |
          set -euxo pipefail
          docker run --rm -d --name mmdr-ci -p 18080:3000 \
            -e MMDR_BIND=0.0.0.0:3000 \
            mermaid-rs-remote-renderer:ci
          # Wait for /health to come up.
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:18080/health | grep -q '^ok$'; then
              echo "healthcheck OK"; break
            fi
            sleep 0.5
          done
          # Render a tiny diagram end-to-end.
          ENC=$(printf 'flowchart LR; A-->B' | base64 | tr '+/' '-_' | tr -d '=')
          curl -fsS "http://127.0.0.1:18080/svg/${ENC}" | head -c 200 | grep -q '<svg'
          docker logs mmdr-ci || true
          docker stop mmdr-ci
