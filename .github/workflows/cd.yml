name: CD

on:
  push:
    branches: [main]

concurrency:
  # Serialize deploys; never run two at once on the same target.
  group: cd-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write   # push to GHCR

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: build and push image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-deploy:
    name: notify deploy webhook
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: POST to deploy webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "${DEPLOY_WEBHOOK_URL}" ]; then
            echo "DEPLOY_WEBHOOK_URL secret not set — skipping redeploy notification."
            echo "Image is published; pull ghcr.io/${{ github.repository }}:sha-${{ github.sha }} from your orchestrator."
            exit 0
          fi
          # Single POST to whatever your orchestrator exposes (Portainer/Watchtower/
          # custom webhook receiver/etc.). The receiver decides what to pull and how.
          curl -fsS -X POST -m 30 \
            -H "Content-Type: application/json" \
            -d "{\"image\":\"ghcr.io/${{ github.repository }}:sha-${{ github.sha }}\"}" \
            "${DEPLOY_WEBHOOK_URL}"
